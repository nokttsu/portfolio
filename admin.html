<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — портфолио</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a; --panel: #141414; --panel2: #1c1c1c; --line: #232323;
      --text: #ededed; --dim: #8a8a8a; --accent: #fff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font: 400 13px/1.5 "Inter", sans-serif; -webkit-font-smoothing: antialiased; }
    .mono { font-family: "IBM Plex Mono", monospace; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
    input, textarea { font: inherit; color: var(--text); background: var(--panel2); border: 1px solid transparent; border-radius: 8px; padding: 8px 10px; width: 100%; }
    input:hover, textarea:hover { border-color: var(--line); }
    input:focus, textarea:focus { outline: none; border-color: #3d3d3d; }
    textarea { min-height: 88px; resize: vertical; }

    #app { display: flex; height: 100%; }

    /* ---- sidebar ---- */
    .side { width: 220px; flex-shrink: 0; border-right: 1px solid var(--line); padding: 16px 10px; display: flex; flex-direction: column; gap: 4px; }
    .side .brand { font-weight: 600; font-size: 13px; padding: 6px 10px 14px; display: flex; align-items: center; gap: 8px; }
    .side .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
    .side .brand .dot.gray { background: #555; }
    .navbtn { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; padding: 7px 10px; border-radius: 8px; color: var(--dim); font-weight: 500; }
    .navbtn:hover { background: var(--panel); color: var(--text); }
    .navbtn.active { background: var(--panel2); color: var(--text); }
    .navbtn svg { flex-shrink: 0; opacity: 0.8; }
    .side .spacer { flex: 1; }
    .side .site-link { font-size: 12px; color: var(--dim); padding: 8px 10px; text-decoration: none; display: block; }
    .side .site-link:hover { color: var(--text); }

    /* ---- main ---- */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .top { height: 56px; flex-shrink: 0; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; padding: 0 20px; }
    .crumb { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; min-width: 0; }
    .crumb .back { display: none; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 8px; color: var(--dim); }
    .crumb .back:hover { background: var(--panel2); color: var(--text); }
    .crumb .back.show { display: flex; }
    .top .grow { flex: 1; }
    .langsw { display: flex; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 2px; }
    .langsw button { padding: 4px 12px; border-radius: 6px; color: var(--dim); font-size: 12px; font-weight: 600; }
    .langsw button.on { background: var(--panel2); color: var(--text); }
    #publish { background: var(--panel2); color: var(--dim); font-weight: 600; padding: 8px 16px; border-radius: 8px; transition: 0.15s; }
    #publish.dirty { background: var(--accent); color: #000; }
    #publish:disabled { opacity: 0.6; cursor: default; }

    .view { flex: 1; overflow-y: auto; padding: 24px 20px 80px; }
    .view-inner { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    /* ---- list rows ---- */
    .rowlist { display: flex; flex-direction: column; gap: 6px; }
    .rec { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; cursor: pointer; }
    .rec:hover { background: var(--panel2); }
    .rec .thumb { width: 56px; height: 39px; border-radius: 6px; background: #202020 center/cover no-repeat; flex-shrink: 0; border: 1px solid var(--line); }
    .rec .thumb.logo { width: 36px; height: 36px; border-radius: 50%; background-size: cover; }
    .rec .info { flex: 1; min-width: 0; }
    .rec .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rec .sub { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rec .ord { display: none; gap: 2px; }
    .rec:hover .ord { display: flex; }
    .rec .ord button { width: 24px; height: 24px; border-radius: 6px; color: var(--dim); }
    .rec .ord button:hover { background: #2a2a2a; color: var(--text); }
    .rec .chev { color: var(--dim); flex-shrink: 0; }
    .addbtn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; border: 1px dashed #333; border-radius: 10px; color: var(--dim); font-weight: 500; width: 100%; }
    .addbtn:hover { color: var(--text); border-color: #4a4a4a; }

    /* ---- editor ---- */
    .fgroup { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .fgroup h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--dim); }
    .f { display: flex; flex-direction: column; gap: 5px; }
    .f > span { font-size: 12px; color: var(--dim); }
    .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 640px) { .frow { grid-template-columns: 1fr; } }

    .cover { position: relative; border: 1px dashed #333; border-radius: 10px; background: #111 center/cover no-repeat; aspect-ratio: 928/649.6; display: flex; align-items: center; justify-content: center; color: var(--dim); cursor: pointer; overflow: hidden; }
    .cover:hover { border-color: #4a4a4a; color: var(--text); }
    .cover.small { aspect-ratio: auto; width: 72px; height: 72px; border-radius: 50%; }
    .cover input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .cover .rm { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: #fff; display: none; }
    .cover.has .rm { display: block; }
    .cover.has .ph { display: none; }

    /* ---- notion-style block editor ---- */
    .blocks { display: flex; flex-direction: column; gap: 2px; padding-left: 52px; }
    .block { position: relative; border-radius: 8px; }
    .block .gut { position: absolute; left: -52px; top: 3px; display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s; }
    .block:hover .gut, .block:focus-within .gut { opacity: 1; }
    .gut button { width: 24px; height: 24px; border-radius: 6px; color: var(--dim); display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .gut button:hover { background: var(--panel2); color: var(--text); }
    .gut .drag { cursor: grab; font-size: 11px; letter-spacing: -1px; }
    .bk { outline: none; padding: 4px 8px; border-radius: 6px; min-height: 28px; white-space: pre-wrap; }
    .bk:hover { background: rgba(255,255,255,0.02); }
    .bk:focus { background: var(--panel); }
    .bk:empty::before { content: attr(data-ph); color: #4a4a4a; pointer-events: none; }
    .bk-h2 { font-size: 20px; font-weight: 600; line-height: 1.3; margin-top: 10px; }
    .bk-p { font-size: 14px; line-height: 1.6; }
    .block.dragover { box-shadow: 0 -2px 0 var(--accent); }
    .block .cover { margin: 4px 8px; }
    .bmenu { position: fixed; z-index: 60; background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 4px; display: flex; flex-direction: column; min-width: 170px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
    .bmenu button { text-align: left; padding: 7px 10px; border-radius: 6px; font-size: 13px; display: flex; gap: 8px; align-items: center; }
    .bmenu button:hover { background: #2c2c2c; }
    .bmenu hr { border: none; border-top: 1px solid var(--line); margin: 4px 0; }
    .bmenu .del { color: #f87171; }

    .danger { color: #f87171; font-size: 12px; align-self: flex-start; padding: 6px 0; }
    .danger:hover { text-decoration: underline; }

    /* ---- toast / gate ---- */
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--panel2); border: 1px solid var(--line); padding: 10px 18px; border-radius: 10px; font-size: 13px; transition: transform 0.25s; z-index: 50; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.ok { border-color: #14532d; } #toast.err { border-color: #7f1d1d; }
    .gate { max-width: 380px; margin: 15vh auto 0; display: flex; flex-direction: column; gap: 14px; padding: 24px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; }
    .gate h2 { font-size: 16px; }
    .gate p { font-size: 12px; color: var(--dim); }
    .gate a { color: #9db8ff; }
    .gate .go { background: var(--accent); color: #000; font-weight: 600; padding: 9px; border-radius: 8px; }

    @media (max-width: 720px) {
      #app { flex-direction: column; }
      .side { width: 100%; flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--line); padding: 8px 10px; overflow-x: auto; }
      .side .brand { padding: 0 8px; white-space: nowrap; }
      .navbtn { width: auto; white-space: nowrap; }
      .side .spacer, .side .site-link { display: none; }
    }
  </style>
</head>
<body>
<div id="app" style="display:none;">
  <aside class="side">
    <div class="brand"><span class="dot gray" id="statusDot"></span> Портфолио CMS</div>
    <button class="navbtn" data-view="projects">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="2.5" width="12" height="10" rx="2" stroke="currentColor"/><path d="M1.5 9.5L5 6.5L8 9L10.5 7L13.5 9.5" stroke="currentColor"/></svg>
      Проекты
    </button>
    <button class="navbtn" data-view="experience">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="2" y="4.5" width="11" height="8" rx="2" stroke="currentColor"/><path d="M5.5 4.5V3.5C5.5 2.9 5.9 2.5 6.5 2.5H8.5C9.1 2.5 9.5 2.9 9.5 3.5V4.5" stroke="currentColor"/></svg>
      Опыт
    </button>
    <button class="navbtn" data-view="texts">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2.5 3.5H12.5M2.5 7.5H12.5M2.5 11.5H8.5" stroke="currentColor"/></svg>
      Тексты
    </button>
    <button class="navbtn" data-view="settings">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor"/><path d="M7.5 1.5V3M7.5 12V13.5M13.5 7.5H12M3 7.5H1.5M11.7 3.3L10.6 4.4M4.4 10.6L3.3 11.7M11.7 11.7L10.6 10.6M4.4 4.4L3.3 3.3" stroke="currentColor"/></svg>
      Настройки
    </button>
    <div class="spacer"></div>
    <a class="site-link" href="index.html" target="_blank">Открыть сайт ↗</a>
  </aside>

  <div class="main">
    <div class="top">
      <div class="crumb">
        <button class="back" id="backBtn" aria-label="Назад">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M9.5 3L5 7.5L9.5 12" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <span id="crumbText">Проекты</span>
      </div>
      <div class="grow"></div>
      <div class="langsw" id="langsw">
        <button data-l="ru" class="on">RU</button>
        <button data-l="en">EN</button>
      </div>
      <button id="publish" disabled>Опубликовано</button>
    </div>
    <div class="view"><div class="view-inner" id="view"></div></div>
  </div>
</div>

<div id="gate" class="gate" style="display:none;">
  <h2>Портфолио CMS</h2>
  <p>Вставь GitHub-токен, чтобы публиковать изменения. Он сохранится только в этом браузере.
     <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Создать токен ↗</a>
     (Only select repositories → portfolio, Contents → Read and write)</p>
  <input type="password" id="gateToken" placeholder="github_pat_…" autocomplete="off">
  <button class="go" id="gateGo">Войти</button>
</div>

<div id="toast"></div>

<script>
const REPO = "nokttsu/portfolio", BRANCH = "main";
const $ = (s, c = document) => c.querySelector(s);
const $$ = (s, c = document) => [...c.querySelectorAll(s)];

let DATA = null, SHA = null, dirty = false;
let route = { view: "projects", idx: null };
let L = localStorage.getItem("cms-lang") || "ru";

const token = () => localStorage.getItem("gh-token") || "";
const b64e = (s) => btoa(String.fromCharCode(...new TextEncoder().encode(s)));
const b64d = (b) => new TextDecoder().decode(Uint8Array.from(atob(b.replace(/\n/g, "")), c => c.charCodeAt(0)));

async function api(path, opts = {}) {
  const headers = { Accept: "application/vnd.github+json", ...(opts.headers || {}) };
  if (token()) headers.Authorization = "Bearer " + token();
  const r = await fetch("https://api.github.com/repos/" + REPO + "/" + path, { ...opts, headers });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).message || "HTTP " + r.status);
  return r.json();
}

let toastTimer;
function toast(msg, cls) {
  const t = $("#toast");
  t.textContent = msg; t.className = "show " + (cls || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => (t.className = ""), 3200);
}

function setDirty(v) {
  dirty = v;
  const b = $("#publish");
  b.disabled = !v;
  b.classList.toggle("dirty", v);
  b.textContent = v ? "Опубликовать" : "Опубликовано";
  $("#statusDot").classList.toggle("gray", v);
}
window.addEventListener("beforeunload", (e) => { if (dirty) { e.preventDefault(); e.returnValue = ""; } });

// ---------- data access helpers ----------
const bi = (obj, key) => {
  if (typeof obj[key] !== "object" || obj[key] === null) obj[key] = { en: obj[key] || "", ru: "" };
  return obj[key];
};
const gv = (v) => (v && typeof v === "object" ? (v[L] ?? v.en ?? "") : v ?? "");

// ---------- field builders ----------
const el = (h) => { const d = document.createElement("div"); d.innerHTML = h.trim(); return d.firstChild; };

function field(label, get, set, o = {}) {
  const n = el(`<label class="f"><span>${label}</span>${o.area ? "<textarea></textarea>" : '<input type="text">'}</label>`);
  const i = $("input,textarea", n);
  i.value = get() ?? "";
  if (o.ph) i.placeholder = o.ph;
  i.addEventListener("input", () => { set(i.value); setDirty(true); });
  return n;
}
const biField = (label, obj, key, o) => field(label + " · " + L.toUpperCase(), () => bi(obj, key)[L], (v) => (bi(obj, key)[L] = v), o);

function imageField(label, obj, key, small, dims) {
  const n = el(`<div class="f"><span>${label}${dims ? ` · <span class="mono" style="font-size:11px;">${dims}</span>` : ""}</span>
    <div class="cover${small ? " small" : ""}${obj[key] ? " has" : ""}" style="${obj[key] ? `background-image:url('${obj[key]}')` : ""}">
      <span class="ph">+ Загрузить${dims && !small ? `<br><span class="mono" style="font-size:11px;opacity:0.7;">${dims}</span>` : ""}</span>
      <input type="file" accept="image/*">
      <button type="button" class="rm">убрать</button>
    </div></div>`);
  const box = $(".cover", n), file = $("input", n);
  file.addEventListener("change", async () => {
    if (!file.files[0]) return;
    try {
      toast("Загружаю картинку…");
      obj[key] = await uploadImage(file.files[0]);
      box.classList.add("has");
      box.style.backgroundImage = `url('${obj[key]}')`;
      setDirty(true);
      toast("Картинка загружена", "ok");
    } catch (e) { toast("Ошибка: " + e.message, "err"); }
  });
  $(".rm", n).addEventListener("click", (e) => {
    e.stopPropagation();
    obj[key] = ""; box.classList.remove("has"); box.style.backgroundImage = "";
    setDirty(true);
  });
  return n;
}

async function uploadImage(f) {
  if (!token()) throw new Error("нужен токен");
  const safe = f.name.toLowerCase().replace(/[^a-z0-9.]+/g, "-");
  const path = "assets/uploads/" + Date.now() + "-" + safe;
  const bytes = new Uint8Array(await f.arrayBuffer());
  let bin = "";
  for (let i = 0; i < bytes.length; i += 0x8000) bin += String.fromCharCode(...bytes.subarray(i, i + 0x8000));
  await api("contents/" + path, { method: "PUT", body: JSON.stringify({ message: "cms: upload " + safe, content: btoa(bin), branch: BRANCH }) });
  return path;
}

// ---------- views ----------
function go(view, idx = null) { route = { view, idx }; render(); }

function render() {
  $$(".navbtn").forEach((b) => b.classList.toggle("active", b.dataset.view === route.view.replace(/^(project|exp)$/, (m) => (m === "project" ? "projects" : "experience"))));
  const v = $("#view");
  v.innerHTML = "";
  const back = $("#backBtn");
  back.classList.toggle("show", route.idx !== null);
  back.onclick = () => go(route.view === "project" ? "projects" : "experience");

  const views = { projects: listProjects, project: editProject, experience: listExperience, exp: editExperience, texts: viewTexts, settings: viewSettings };
  views[route.view](v);
}

function recRow({ thumb, logo, name, sub, onClick, arr, i }) {
  const r = el(`<div class="rec">
    <div class="thumb${logo ? " logo" : ""}" ${thumb ? `style="background-image:url('${thumb}')"` : ""}></div>
    <div class="info"><div class="name"></div><div class="sub"></div></div>
    <div class="ord"><button type="button">↑</button><button type="button">↓</button></div>
    <svg class="chev" width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M5.5 3L10 7.5L5.5 12" stroke="currentColor"/></svg>
  </div>`);
  $(".name", r).textContent = name || "Без названия";
  $(".sub", r).textContent = sub || "";
  r.addEventListener("click", (e) => { if (!e.target.closest(".ord")) onClick(); });
  const [up, down] = $$(".ord button", r);
  up.addEventListener("click", () => { if (i > 0) { [arr[i - 1], arr[i]] = [arr[i], arr[i - 1]]; setDirty(true); render(); } });
  down.addEventListener("click", () => { if (i < arr.length - 1) { [arr[i + 1], arr[i]] = [arr[i], arr[i + 1]]; setDirty(true); render(); } });
  return r;
}

function listProjects(v) {
  $("#crumbText").textContent = "Проекты";
  const list = el('<div class="rowlist"></div>');
  DATA.projects.forEach((p, i) => list.appendChild(recRow({
    thumb: p.image, name: gv(p.name), sub: (p.awards || []).join(" · "),
    onClick: () => go("project", i), arr: DATA.projects, i
  })));
  v.appendChild(list);
  const add = el('<button class="addbtn">+ Новый проект</button>');
  add.addEventListener("click", () => {
    DATA.projects.push({ name: { en: "New project", ru: "Новый проект" }, subtitle: { en: "", ru: "" }, awards: [], image: "", sections: [] });
    setDirty(true);
    go("project", DATA.projects.length - 1);
  });
  v.appendChild(add);
}

function editProject(v) {
  const p = DATA.projects[route.idx];
  $("#crumbText").textContent = gv(p.name) || "Проект";

  const main = el('<div class="fgroup"></div>');
  main.appendChild(imageField("Обложка", p, "image", false, "1856 × 1300 px"));
  main.appendChild(biField("Название", p, "name"));
  main.appendChild(biField("Подзаголовок", p, "subtitle"));
  main.appendChild(field("Награды и метрики (через запятую)", () => (p.awards || []).join(", "), (val) => (p.awards = val.split(",").map((s) => s.trim()).filter(Boolean)), { ph: "Award, +20% CTR" }));
  v.appendChild(main);

  v.appendChild(blockEditor(p));

  const del = el('<button class="danger">Удалить проект</button>');
  del.addEventListener("click", () => { if (confirm("Удалить проект целиком?")) { DATA.projects.splice(route.idx, 1); setDirty(true); go("projects"); } });
  v.appendChild(del);
}

// ---------- Notion-style block editor for case content ----------

function sectionsToBlocks(sections) {
  const blocks = [];
  (sections || []).forEach((s) => {
    if (s.title && (s.title.en || s.title.ru)) blocks.push({ type: "h2", text: s.title });
    if (s.text && (s.text.en || s.text.ru)) blocks.push({ type: "p", text: s.text });
    blocks.push({ type: "img", src: s.image || "" });
  });
  return blocks;
}

let menuNode = null;
function closeMenu() { if (menuNode) { menuNode.remove(); menuNode = null; } }
document.addEventListener("click", (e) => { if (menuNode && !menuNode.contains(e.target)) closeMenu(); }, true);

function openMenu(anchor, onPick, onDelete) {
  closeMenu();
  menuNode = el(`<div class="bmenu">
    <button data-t="p">¶ Текст</button>
    <button data-t="h2">H Заголовок</button>
    <button data-t="img">▣ Картинка</button>
    <hr><button class="del">Удалить блок</button>
  </div>`);
  document.body.appendChild(menuNode);
  const r = anchor.getBoundingClientRect();
  menuNode.style.left = Math.min(r.left, innerWidth - 190) + "px";
  menuNode.style.top = Math.min(r.bottom + 4, innerHeight - menuNode.offsetHeight - 10) + "px";
  menuNode.querySelectorAll("[data-t]").forEach((b) =>
    b.addEventListener("click", () => { closeMenu(); onPick(b.dataset.t); })
  );
  $(".del", menuNode).addEventListener("click", () => { closeMenu(); onDelete(); });
}

function blockEditor(p) {
  if (!p.body) { p.body = sectionsToBlocks(p.sections); delete p.sections; }
  const wrap = el('<div class="fgroup"><h3>Контент кейса</h3><div class="blocks"></div></div>');
  const box = $(".blocks", wrap);

  const focusBlock = (k) => {
    const n = box.children[k] && box.children[k].querySelector("[contenteditable]");
    if (!n) return;
    n.focus();
    const rng = document.createRange();
    rng.selectNodeContents(n);
    rng.collapse(false);
    const sel = getSelection();
    sel.removeAllRanges();
    sel.addRange(rng);
  };

  const rerender = (focusIdx = null) => {
    if (!p.body.length) p.body.push({ type: "p", text: { en: "", ru: "" } });
    box.innerHTML = "";
    p.body.forEach((b, k) => box.appendChild(blockRow(b, k)));
    if (focusIdx !== null) focusBlock(focusIdx);
  };

  function blockRow(b, k) {
    const row = el(`<div class="block">
      <div class="gut"><button type="button" class="add" title="Добавить блок">+</button><button type="button" class="drag" draggable="true" title="Перетащить">⋮⋮</button></div>
      <div class="bc"></div></div>`);
    const bc = $(".bc", row);

    if (b.type === "img") {
      const cov = el(`<div class="cover${b.src ? " has" : ""}" style="${b.src ? `background-image:url('${b.src}')` : ""}">
        <span class="ph">+ Картинка<br><span class="mono" style="font-size:11px;opacity:0.7;">1856 × 1300 px</span></span><input type="file" accept="image/*"><button type="button" class="rm">убрать</button></div>`);
      const file = $("input", cov);
      file.addEventListener("change", async () => {
        if (!file.files[0]) return;
        try {
          toast("Загружаю картинку…");
          b.src = await uploadImage(file.files[0]);
          cov.classList.add("has");
          cov.style.backgroundImage = `url('${b.src}')`;
          setDirty(true);
          toast("Картинка загружена", "ok");
        } catch (err) { toast("Ошибка: " + err.message, "err"); }
      });
      $(".rm", cov).addEventListener("click", (e) => { e.stopPropagation(); b.src = ""; cov.classList.remove("has"); cov.style.backgroundImage = ""; setDirty(true); });
      bc.appendChild(cov);
    } else {
      const ed = el(`<div class="bk ${b.type === "h2" ? "bk-h2" : "bk-p"}" contenteditable="true"></div>`);
      ed.dataset.ph = b.type === "h2" ? "Заголовок" : "Текст — Enter для нового блока";
      ed.innerText = bi(b, "text")[L] || "";
      ed.addEventListener("input", () => { bi(b, "text")[L] = ed.innerText; setDirty(true); });
      ed.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          p.body.splice(k + 1, 0, { type: "p", text: { en: "", ru: "" } });
          setDirty(true);
          rerender(k + 1);
        } else if (e.key === "Backspace" && ed.innerText.trim() === "" && p.body.length > 1) {
          e.preventDefault();
          p.body.splice(k, 1);
          setDirty(true);
          rerender(Math.max(0, k - 1));
        }
      });
      bc.appendChild(ed);
    }

    $(".add", row).addEventListener("click", (e) => {
      e.stopPropagation();
      openMenu(e.currentTarget,
        (type) => {
          p.body.splice(k + 1, 0, type === "img" ? { type: "img", src: "" } : { type, text: { en: "", ru: "" } });
          setDirty(true);
          rerender(type === "img" ? null : k + 1);
        },
        () => { p.body.splice(k, 1); setDirty(true); rerender(); }
      );
    });

    const handle = $(".drag", row);
    handle.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/plain", String(k));
      e.dataTransfer.effectAllowed = "move";
    });
    row.addEventListener("dragover", (e) => { e.preventDefault(); row.classList.add("dragover"); });
    row.addEventListener("dragleave", () => row.classList.remove("dragover"));
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      row.classList.remove("dragover");
      const from = parseInt(e.dataTransfer.getData("text/plain"), 10);
      if (isNaN(from) || from === k) return;
      const item = p.body.splice(from, 1)[0];
      p.body.splice(from < k ? k - 1 : k, 0, item);
      setDirty(true);
      rerender();
    });

    return row;
  }

  rerender();
  return wrap;
}

function listExperience(v) {
  $("#crumbText").textContent = "Опыт";
  const list = el('<div class="rowlist"></div>');
  DATA.experience.forEach((e, i) => list.appendChild(recRow({
    thumb: e.logo, logo: true, name: e.company, sub: e.current ? "Текущее место" : e.period,
    onClick: () => go("exp", i), arr: DATA.experience, i
  })));
  v.appendChild(list);
  const add = el('<button class="addbtn">+ Добавить место</button>');
  add.addEventListener("click", () => {
    DATA.experience.push({ company: "", role: { en: "", ru: "" }, period: "", logo: "", round: false, current: false });
    setDirty(true);
    go("exp", DATA.experience.length - 1);
  });
  v.appendChild(add);
}

function editExperience(v) {
  const e = DATA.experience[route.idx];
  $("#crumbText").textContent = e.company || "Место работы";
  const g = el('<div class="fgroup"></div>');
  g.appendChild(imageField("Логотип · 80 × 80 px", e, "logo", true));
  g.appendChild(field("Компания", () => e.company, (val) => (e.company = val)));
  g.appendChild(biField("Роль", e, "role"));
  const r = el('<div class="frow"></div>');
  r.appendChild(field("Период", () => e.period, (val) => (e.period = val), { ph: "2023—2024" }));
  const cur = el('<label class="f"><span>Текущее место</span><div style="display:flex;align-items:center;gap:8px;height:37px;"><input type="checkbox" style="width:16px;height:16px;"><span style="font-size:13px;color:var(--text);">да, работаю здесь</span></div></label>');
  const cb = $('input[type=checkbox]', cur);
  cb.checked = !!e.current;
  cb.addEventListener("change", () => { e.current = cb.checked; setDirty(true); });
  r.appendChild(cur);
  g.appendChild(r);
  v.appendChild(g);
  const del = el('<button class="danger">Удалить место работы</button>');
  del.addEventListener("click", () => { if (confirm("Удалить?")) { DATA.experience.splice(route.idx, 1); setDirty(true); go("experience"); } });
  v.appendChild(del);
}

  g2.appendChild(biField("Текст «Навыки»", DATA, "skillsText", { area: true }));

function viewSettings(v) {
  $("#crumbText").textContent = "Настройки";
  const g = el('<div class="fgroup"><h3>Контакты</h3></div>');
  g.appendChild(field("Email", () => DATA.site.email, (val) => (DATA.site.email = val)));
  g.appendChild(field("Ссылка на CV", () => DATA.site.cvUrl, (val) => (DATA.site.cvUrl = val)));
  g.appendChild(field("Ссылка Telegram", () => DATA.site.telegram, (val) => (DATA.site.telegram = val)));
  v.appendChild(g);

  const g2 = el('<div class="fgroup"><h3>Доступ</h3></div>');
  const t = el('<label class="f"><span>GitHub token</span><input type="password" autocomplete="off"></label>');
  const ti = $("input", t);
  ti.value = token();
  ti.addEventListener("input", () => localStorage.setItem("gh-token", ti.value.trim()));
  g2.appendChild(t);
  const out = el('<button class="danger">Выйти (удалить токен из браузера)</button>');
  out.addEventListener("click", () => { localStorage.removeItem("gh-token"); location.reload(); });
  g2.appendChild(out);
  v.appendChild(g2);
}

// ---------- publish ----------
$("#publish").addEventListener("click", async () => {
  if (!token()) { toast("Нужен токен — вкладка Настройки", "err"); return; }
  const b = $("#publish");
  b.disabled = true; b.textContent = "Публикую…";
  try {
    const res = await api("contents/content.json", {
      method: "PUT",
      body: JSON.stringify({ message: "content: update via CMS", content: b64e(JSON.stringify(DATA, null, 2) + "\n"), sha: SHA, branch: BRANCH }),
    });
    SHA = res.content.sha;
    setDirty(false);
    toast("Опубликовано — сайт обновится через ~1 минуту", "ok");
  } catch (e) {
    toast("Ошибка: " + e.message, "err");
    setDirty(true);
  }
});

// ---------- lang switch & nav ----------
$("#langsw").addEventListener("click", (e) => {
  const b = e.target.closest("button");
  if (!b) return;
  L = b.dataset.l;
  localStorage.setItem("cms-lang", L);
  $$("#langsw button").forEach((x) => x.classList.toggle("on", x === b));
  render();
});
$$(".navbtn").forEach((b) => b.addEventListener("click", () => go(b.dataset.view)));

// ---------- boot ----------
(async function boot() {
  $$("#langsw button").forEach((x) => x.classList.toggle("on", x.dataset.l === L));
  if (!token()) {
    $("#gate").style.display = "flex";
    $("#gateGo").addEventListener("click", () => {
      const val = $("#gateToken").value.trim();
      if (val) localStorage.setItem("gh-token", val);
      location.reload();
    });
    return;
  }
  try {
    const f = await api("contents/content.json?ref=" + BRANCH);
    SHA = f.sha;
    DATA = JSON.parse(b64d(f.content));
    $("#app").style.display = "flex";
    render();
  } catch (e) {
    $("#gate").style.display = "flex";
    $("#gate h2").textContent = "Не удалось загрузить контент";
    $("#gate p").textContent = e.message + " — проверь токен и попробуй ещё раз.";
  }
})();
</script>
