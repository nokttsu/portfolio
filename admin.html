<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — портфолио</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a; --panel: #141414; --panel2: #1c1c1c; --panel3: #262626;
      --line: #232323; --line2: #303030;
      --text: #ededed; --dim: #8a8a8a; --faint: #4a4a4a; --accent: #fff;
      --ok: #4ade80; --danger: #f87171;
      --ease: cubic-bezier(0.2, 0.7, 0.3, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font: 400 13px/1.5 "Inter", sans-serif; -webkit-font-smoothing: antialiased; }
    .mono { font-family: "IBM Plex Mono", monospace; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
    button:focus-visible, a:focus-visible { outline: 2px solid rgba(255,255,255,0.35); outline-offset: 2px; border-radius: 6px; }
    ::selection { background: #fff; color: #000; }

    * { scrollbar-width: thin; scrollbar-color: var(--line2) transparent; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #3d3d3d; }

    input, textarea {
      font: inherit; color: var(--text); background: var(--panel2);
      border: 1px solid transparent; border-radius: 8px; padding: 8px 10px; width: 100%;
      transition: border-color 0.15s var(--ease), background-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
    }
    input:hover, textarea:hover { border-color: var(--line2); }
    input:focus, textarea:focus { outline: none; border-color: #3d3d3d; background: #202020; box-shadow: 0 0 0 3px rgba(255,255,255,0.04); }
    textarea { min-height: 88px; resize: vertical; }

    #app { display: flex; height: 100%; }

    /* ---- sidebar ---- */
    .side { width: 220px; flex-shrink: 0; border-right: 1px solid var(--line); padding: 16px 10px; display: flex; flex-direction: column; gap: 4px; }
    .side .brand { font-weight: 600; font-size: 13px; padding: 6px 10px 14px; display: flex; align-items: center; gap: 8px; }
    .side .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); transition: background-color 0.3s; box-shadow: 0 0 8px rgba(74,222,128,0.35); }
    .side .brand .dot.gray { background: #555; box-shadow: none; }
    .navbtn {
      display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
      padding: 7px 10px; border-radius: 8px; color: var(--dim); font-weight: 500;
      transition: background-color 0.15s var(--ease), color 0.15s var(--ease);
    }
    .navbtn:hover { background: var(--panel); color: var(--text); }
    .navbtn.active { background: var(--panel2); color: var(--text); }
    .navbtn svg { flex-shrink: 0; opacity: 0.8; }
    .side .spacer { flex: 1; }
    .side .site-link { font-size: 12px; color: var(--dim); padding: 8px 10px; text-decoration: none; display: block; transition: color 0.15s; }
    .side .site-link:hover { color: var(--text); }

    /* ---- main ---- */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .top {
      height: 56px; flex-shrink: 0; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 12px; padding: 0 20px;
      background: rgba(10,10,10,0.85); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    }
    .crumb { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; min-width: 0; }
    .crumb .back {
      display: none; align-items: center; justify-content: center; width: 28px; height: 28px;
      border-radius: 8px; color: var(--dim); transition: background-color 0.15s, color 0.15s, transform 0.15s var(--ease);
    }
    .crumb .back:hover { background: var(--panel2); color: var(--text); transform: translateX(-1px); }
    .crumb .back.show { display: flex; }
    #crumbText { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top .grow { flex: 1; }
    .langsw { display: flex; background: var(--panel); border: 1px solid var(--line); border-radius: 99px; padding: 2px; }
    .langsw button { padding: 4px 12px; border-radius: 99px; color: var(--dim); font-size: 12px; font-weight: 600; transition: background-color 0.18s var(--ease), color 0.18s var(--ease); }
    .langsw button.on { background: var(--panel3); color: var(--text); }
    #publish {
      background: var(--panel2); color: var(--dim); font-weight: 600; padding: 8px 18px; border-radius: 99px;
      transition: background-color 0.2s var(--ease), color 0.2s var(--ease), transform 0.15s var(--ease), opacity 0.2s;
    }
    #publish.dirty { background: var(--accent); color: #000; }
    #publish.dirty:hover { transform: translateY(-1px); }
    #publish.dirty:active { transform: scale(0.97); }
    #publish:disabled { opacity: 0.65; cursor: default; }

    .view { flex: 1; overflow-y: auto; padding: 24px 20px 80px; scroll-behavior: smooth; }
    .view-inner { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    /* each render creates fresh nodes → the entrance plays on every view switch */
    .view-inner > * { animation: vin 0.28s var(--ease) both; }
    .view-inner > *:nth-child(2) { animation-delay: 0.03s; }
    .view-inner > *:nth-child(3) { animation-delay: 0.06s; }
    .view-inner > *:nth-child(4) { animation-delay: 0.09s; }
    .view-inner > *:nth-child(n+5) { animation-delay: 0.12s; }
    @keyframes vin { from { opacity: 0; transform: translateY(10px); } }

    /* ---- list rows ---- */
    .rowlist { display: flex; flex-direction: column; gap: 6px; }
    .rec {
      display: flex; align-items: center; gap: 12px; padding: 10px 12px;
      background: var(--panel); border: 1px solid var(--line); border-radius: 10px; cursor: pointer;
      transition: background-color 0.15s var(--ease), border-color 0.15s var(--ease), transform 0.15s var(--ease);
    }
    .rec:hover { background: var(--panel2); border-color: var(--line2); }
    .rec:active { transform: scale(0.995); }
    .rec .thumb { width: 56px; height: 39px; border-radius: 6px; background: #202020 center/cover no-repeat; flex-shrink: 0; border: 1px solid var(--line); }
    .rec .thumb.logo { width: 36px; height: 36px; border-radius: 50%; background-size: cover; }
    .rec .info { flex: 1; min-width: 0; }
    .rec .name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rec .sub { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rec .ord { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
    .rec:hover .ord, .rec:focus-within .ord { opacity: 1; }
    .rec .ord button { width: 24px; height: 24px; border-radius: 6px; color: var(--dim); transition: background-color 0.12s, color 0.12s; }
    .rec .ord button:hover { background: var(--panel3); color: var(--text); }
    .rec .chev { color: var(--dim); flex-shrink: 0; transition: transform 0.18s var(--ease), color 0.18s; }
    .rec:hover .chev { transform: translateX(2px); color: var(--text); }
    .addbtn {
      display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px;
      border: 1px dashed #333; border-radius: 10px; color: var(--dim); font-weight: 500; width: 100%;
      transition: color 0.15s, border-color 0.15s, background-color 0.15s;
    }
    .addbtn:hover { color: var(--text); border-color: #4a4a4a; background: rgba(255,255,255,0.02); }
    .empty { text-align: center; color: var(--faint); padding: 32px 0 12px; font-size: 13px; }

    /* ---- editor ---- */
    .fgroup { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .fgroup h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--dim); }
    .f { display: flex; flex-direction: column; gap: 5px; }
    .f > span { font-size: 12px; color: var(--dim); }
    .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 640px) { .frow { grid-template-columns: 1fr; } }

    .cover {
      position: relative; border: 1px dashed #333; border-radius: 10px;
      background: #111 center/cover no-repeat; aspect-ratio: 928/649.6;
      display: flex; align-items: center; justify-content: center; color: var(--dim);
      cursor: pointer; overflow: hidden; transition: border-color 0.15s, color 0.15s;
    }
    .cover:hover { border-color: #4a4a4a; color: var(--text); }
    .cover.small { aspect-ratio: auto; width: 72px; height: 72px; border-radius: 50%; }
    .cover input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .cover .rm { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: #fff; display: none; }
    .cover.has .rm { display: block; }
    .cover.has .ph { display: none; }

    /* ---- notion-style block editor ---- */
    .blocks { display: flex; flex-direction: column; gap: 2px; padding-left: 52px; }
    .block { position: relative; border-radius: 8px; }
    .block .gut { position: absolute; left: -52px; top: 3px; display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
    .block:hover .gut, .block:focus-within .gut { opacity: 1; }
    .gut button { width: 24px; height: 24px; border-radius: 6px; color: var(--dim); display: flex; align-items: center; justify-content: center; font-size: 15px; transition: background-color 0.12s, color 0.12s; }
    .gut button:hover { background: var(--panel2); color: var(--text); }
    .gut .drag { cursor: grab; font-size: 11px; letter-spacing: -1px; }
    .bk { outline: none; padding: 4px 8px; border-radius: 6px; min-height: 28px; white-space: pre-wrap; transition: background-color 0.12s; }
    .bk:hover { background: rgba(255,255,255,0.02); }
    .bk:focus { background: var(--panel2); }
    .bk:empty::before { content: attr(data-ph); color: var(--faint); pointer-events: none; }
    .bk-h2 { font-size: 20px; font-weight: 600; line-height: 1.3; margin-top: 10px; }
    .bk-h3 { font-size: 16px; font-weight: 600; line-height: 1.35; margin-top: 6px; }
    .bk-p { font-size: 14px; line-height: 1.6; }
    .bk-quote { font-size: 15px; line-height: 1.55; border-left: 2px solid #666; border-radius: 2px 6px 6px 2px; padding-left: 14px; }
    .bk-ul { font-size: 14px; line-height: 1.7; }
    .bk-ul > div { position: relative; padding-left: 18px; }
    .bk-ul > div::before { content: "•"; position: absolute; left: 4px; color: var(--dim); }
    .bk-callout { display: flex; gap: 8px; align-items: flex-start; background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; margin: 4px 0; }
    .bk-callout .ico { width: 30px; flex-shrink: 0; background: none; border: none; padding: 4px 0; text-align: center; font-size: 15px; border-radius: 6px; box-shadow: none; }
    .bk-callout .ico:hover { background: var(--panel3); }
    .bk-callout .bk { flex: 1; }
    .bk-callout .bk:focus { background: none; }
    .bk-hr { padding: 12px 8px; cursor: default; }
    .bk-hr hr { border: none; border-top: 1px solid var(--line2); }
    .bk-facts, .bk-stats { font-size: 13px; line-height: 1.7; }
    .bk-lines-facts > div, .bk-lines-stats > div { position: relative; padding-left: 18px; }
    .bk-lines-facts > div::before { content: "≔"; position: absolute; left: 0; color: var(--dim); }
    .bk-lines-stats > div::before { content: "#"; position: absolute; left: 2px; color: var(--dim); }
    .bk-testimonial { display: flex; flex-direction: column; gap: 6px; background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 8px 10px; margin: 4px 0; }
    .bk-testimonial .bk:focus { background: none; }
    .bk-testimonial .author { font-size: 12px; background: var(--panel); }
    .bk-pair { margin: 4px 8px; }
    .bk-pair .cover { margin: 0; }
    .block.dragover { box-shadow: 0 -2px 0 var(--accent); }
    .block .cover { margin: 4px 8px; }

    .bmenu {
      position: fixed; z-index: 60; background: var(--panel2); border: 1px solid var(--line2);
      border-radius: 12px; padding: 4px; display: flex; flex-direction: column; min-width: 200px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.55); max-height: 65vh; overflow-y: auto;
      animation: pop 0.15s var(--ease); transform-origin: top left;
    }
    @keyframes pop { from { opacity: 0; transform: scale(0.96) translateY(-3px); } }
    .bmenu .lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--faint); padding: 6px 10px 3px; }
    .bmenu button { text-align: left; padding: 6px 10px; border-radius: 8px; font-size: 13px; display: flex; gap: 10px; align-items: center; transition: background-color 0.1s; }
    .bmenu button:hover { background: var(--panel3); }
    .bmenu button .ic { width: 24px; flex-shrink: 0; color: var(--dim); font-family: "IBM Plex Mono", monospace; font-size: 12px; text-align: center; }
    .bmenu hr { border: none; border-top: 1px solid var(--line); margin: 4px 0; }
    .bmenu .del { color: var(--danger); }

    .danger { color: var(--danger); font-size: 12px; align-self: flex-start; padding: 6px 0; }
    .danger:hover { text-decoration: underline; }
    .hint { font-size: 11px; color: var(--faint); }

    /* ---- toast / gate ---- */
    #toast {
      position: fixed; bottom: 20px; left: 50%; z-index: 50;
      transform: translateX(-50%) translateY(80px); opacity: 0;
      background: var(--panel2); border: 1px solid var(--line2); padding: 10px 18px;
      border-radius: 99px; font-size: 13px; box-shadow: 0 8px 30px rgba(0,0,0,0.45);
      transition: transform 0.3s var(--ease), opacity 0.3s var(--ease);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.ok { border-color: #14532d; }
    #toast.err { border-color: #7f1d1d; }
    .gate { max-width: 380px; margin: 15vh auto 0; display: flex; flex-direction: column; gap: 14px; padding: 24px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; animation: vin 0.3s var(--ease) both; }
    .gate h2 { font-size: 16px; }
    .gate p { font-size: 12px; color: var(--dim); }
    .gate a { color: #9db8ff; }
    .gate .go { background: var(--accent); color: #000; font-weight: 600; padding: 9px; border-radius: 8px; transition: transform 0.15s var(--ease); }
    .gate .go:hover { transform: translateY(-1px); }

    @media (max-width: 720px) {
      #app { flex-direction: column; }
      .side { width: 100%; flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--line); padding: 8px 10px; overflow-x: auto; scrollbar-width: none; }
      .side::-webkit-scrollbar { display: none; }
      .side .brand { padding: 0 8px; white-space: nowrap; }
      .navbtn { width: auto; white-space: nowrap; }
      .side .spacer, .side .site-link { display: none; }
      .top { padding: 0 12px; gap: 8px; }
      .view { padding: 16px 12px 80px; }
      .blocks { padding-left: 0; }
      .block .gut { position: static; opacity: 1; padding: 2px 0 0 8px; }
    }
  </style>
</head>
<body>
<div id="app" style="display:none;">
  <aside class="side">
    <div class="brand"><span class="dot gray" id="statusDot"></span> Портфолио CMS</div>
    <button class="navbtn" data-view="projects">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1.5" y="2.5" width="12" height="10" rx="2" stroke="currentColor"/><path d="M1.5 9.5L5 6.5L8 9L10.5 7L13.5 9.5" stroke="currentColor"/></svg>
      Проекты
    </button>
    <button class="navbtn" data-view="experience">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="2" y="4.5" width="11" height="8" rx="2" stroke="currentColor"/><path d="M5.5 4.5V3.5C5.5 2.9 5.9 2.5 6.5 2.5H8.5C9.1 2.5 9.5 2.9 9.5 3.5V4.5" stroke="currentColor"/></svg>
      Опыт
    </button>
    <button class="navbtn" data-view="texts">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2.5 3.5H12.5M2.5 7.5H12.5M2.5 11.5H8.5" stroke="currentColor"/></svg>
      Тексты
    </button>
    <button class="navbtn" data-view="settings">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor"/><path d="M7.5 1.5V3M7.5 12V13.5M13.5 7.5H12M3 7.5H1.5M11.7 3.3L10.6 4.4M4.4 10.6L3.3 11.7M11.7 11.7L10.6 10.6M4.4 4.4L3.3 3.3" stroke="currentColor"/></svg>
      Настройки
    </button>
    <div class="spacer"></div>
    <a class="site-link" href="index.html" target="_blank">Открыть сайт ↗</a>
  </aside>

  <div class="main">
    <div class="top">
      <div class="crumb">
        <button class="back" id="backBtn" aria-label="Назад">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M9.5 3L5 7.5L9.5 12" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <span id="crumbText">Проекты</span>
      </div>
      <div class="grow"></div>
      <div class="langsw" id="langsw">
        <button data-l="ru" class="on">RU</button>
        <button data-l="en">EN</button>
      </div>
      <button id="publish" disabled>Опубликовано</button>
    </div>
    <div class="view"><div class="view-inner" id="view"></div></div>
  </div>
</div>

<div id="gate" class="gate" style="display:none;">
  <h2>Портфолио CMS</h2>
  <p>Вставь GitHub-токен, чтобы публиковать изменения. Он сохранится только в этом браузере.
     <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Создать токен ↗</a>
     (Only select repositories → portfolio, Contents → Read and write)</p>
  <input type="password" id="gateToken" placeholder="github_pat_…" autocomplete="off">
  <button class="go" id="gateGo">Войти</button>
</div>

<div id="toast"></div>

<script>
const REPO = "nokttsu/portfolio", BRANCH = "main";
const $ = (s, c = document) => c.querySelector(s);
const $$ = (s, c = document) => [...c.querySelectorAll(s)];

let DATA = null, SHA = null, dirty = false;
let route = { view: "projects", idx: null };
let L = localStorage.getItem("cms-lang") || "ru";

const token = () => localStorage.getItem("gh-token") || "";
const b64e = (s) => btoa(String.fromCharCode(...new TextEncoder().encode(s)));
const b64d = (b) => new TextDecoder().decode(Uint8Array.from(atob(b.replace(/\n/g, "")), c => c.charCodeAt(0)));

async function api(path, opts = {}) {
  const headers = { Accept: "application/vnd.github+json", ...(opts.headers || {}) };
  if (token()) headers.Authorization = "Bearer " + token();
  const r = await fetch("https://api.github.com/repos/" + REPO + "/" + path, { ...opts, headers });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).message || "HTTP " + r.status);
  return r.json();
}

let toastTimer;
function toast(msg, cls) {
  const t = $("#toast");
  t.textContent = msg; t.className = "show " + (cls || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => (t.className = ""), 3200);
}

function setDirty(v) {
  dirty = v;
  const b = $("#publish");
  b.disabled = !v;
  b.classList.toggle("dirty", v);
  b.textContent = v ? "Опубликовать" : "Опубликовано";
  $("#statusDot").classList.toggle("gray", v);
}
window.addEventListener("beforeunload", (e) => { if (dirty) { e.preventDefault(); e.returnValue = ""; } });

// ---------- data access helpers ----------
const bi = (obj, key) => {
  if (typeof obj[key] !== "object" || obj[key] === null) obj[key] = { en: obj[key] || "", ru: "" };
  return obj[key];
};
const gv = (v) => (v && typeof v === "object" ? (v[L] ?? v.en ?? "") : v ?? "");

// ---------- field builders ----------
const el = (h) => { const d = document.createElement("div"); d.innerHTML = h.trim(); return d.firstChild; };

function field(label, get, set, o = {}) {
  const n = el(`<label class="f"><span>${label}</span>${o.area ? "<textarea></textarea>" : '<input type="text">'}</label>`);
  const i = $("input,textarea", n);
  i.value = get() ?? "";
  if (o.ph) i.placeholder = o.ph;
  i.addEventListener("input", () => { set(i.value); setDirty(true); });
  return n;
}
const biField = (label, obj, key, o) => field(label + " · " + L.toUpperCase(), () => bi(obj, key)[L], (v) => (bi(obj, key)[L] = v), o);

function imageField(label, obj, key, small, dims) {
  const n = el(`<div class="f"><span>${label}${dims ? ` · <span class="mono" style="font-size:11px;">${dims}</span>` : ""}</span>
    <div class="cover${small ? " small" : ""}${obj[key] ? " has" : ""}" style="${obj[key] ? `background-image:url('${obj[key]}')` : ""}">
      <span class="ph">+ Загрузить${dims && !small ? `<br><span class="mono" style="font-size:11px;opacity:0.7;">${dims}</span>` : ""}</span>
      <input type="file" accept="image/*">
      <button type="button" class="rm">убрать</button>
    </div></div>`);
  const box = $(".cover", n), file = $("input", n);
  file.addEventListener("change", async () => {
    if (!file.files[0]) return;
    try {
      toast("Загружаю картинку…");
      obj[key] = await uploadImage(file.files[0]);
      box.classList.add("has");
      box.style.backgroundImage = `url('${obj[key]}')`;

    e.stopPropagation();

    setDirty(true);
  });

}

async function uploadImage(f) {
  if (!token()) throw new Error("нужен токен");
  const safe = f.name.toLowerCase().replace(/[^a-z0-9.]+/g, "-");
  const path = "assets/uploads/" + Date.now() + "-" + safe;
  const bytes = new Uint8Array(await f.arrayBuffer());
  let bin = "";
  for (let i = 0; i < bytes.length; i += 0x8000) bin += String.fromCharCode(...bytes.subarray(i, i + 0x8000));
  await api("contents/" + path, { method: "PUT", body: JSON.stringify({ message: "cms: upload " + safe, content: btoa(bin), branch: BRANCH }) });
  return path;
}

// ---------- Notion-style block editor for case content ----------

function sectionsToBlocks(sections) {
  const blocks = [];
  (sections || []).forEach((s) => {
    if (s.title && (s.title.en || s.title.ru)) blocks.push({ type: "h2", text: s.title });
    if (s.text && (s.text.en || s.text.ru)) blocks.push({ type: "p", text: s.text });
    blocks.push({ type: "img", src: s.image || "" });
  });
  return blocks;
}

const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

// Block type registry: [type, menu icon, label]
const BLOCK_TYPES = [
  ["p", "¶", "Текст"],
  ["h2", "H2", "Заголовок"],
  ["h3", "H3", "Подзаголовок"],
  ["ul", "•", "Список"],
  ["quote", "❝", "Цитата"],
  ["callout", "💡", "Врезка"],
  ["facts", "≔", "Факты (TL;DR)"],
  ["stats", "42", "Цифры"],
  ["testimonial", "„”", "Отзыв"],
  ["img", "▣", "Картинка"],
  ["grid", "▦", "Две картинки"],
  ["compare", "⇆", "До / После"],
  ["divider", "—", "Разделитель"],
];
const BLOCK_PH = {
  p: "Текст — «/» для меню, Enter для нового блока",
  h2: "Заголовок",
  h3: "Подзаголовок",
  quote: "Цитата",
  ul: "Список — Enter для нового пункта",
  callout: "Врезка",
  facts: "Факт на строку: «Роль: Lead UI Designer»",
  stats: "Цифра на строку: «3 | продукта на одной системе»",
  testimonial: "Цитата коллеги или заказчика",
};
// Types edited as one line per item
const LINE_TYPES = { ul: 1, facts: 1, stats: 1 };
function newBlock(type) {
  if (type === "img") return { type: "img", src: "" };
  if (type === "divider") return { type: "divider" };
  if (type === "grid") return { type: "grid", images: ["", ""] };
  if (type === "compare") return { type: "compare", before: "", after: "" };
  if (type === "callout") return { type: "callout", icon: "💡", text: { en: "", ru: "" } };
  if (type === "testimonial") return { type: "testimonial", text: { en: "", ru: "" }, author: { en: "", ru: "" } };
  return { type, text: { en: "", ru: "" } };
}

let menuNode = null;
function closeMenu() { if (menuNode) { menuNode.remove(); menuNode = null; } }
document.addEventListener("click", (e) => { if (menuNode && !menuNode.contains(e.target)) closeMenu(); }, true);

function openMenu(anchor, title, onPick, onDelete) {
  closeMenu();
  menuNode = el(`<div class="bmenu">
    <div class="lbl">${title}</div>
    ${BLOCK_TYPES.map(([t, ic, label]) => `<button data-t="${t}"><span class="ic">${ic}</span>${label}</button>`).join("")}
    ${onDelete ? '<hr><button class="del"><span class="ic">✕</span>Удалить блок</button>' : ""}
  </div>`);
  document.body.appendChild(menuNode);
  const r = anchor.getBoundingClientRect();
  menuNode.style.left = Math.min(r.left, innerWidth - menuNode.offsetWidth - 12) + "px";
  menuNode.style.top = Math.min(r.bottom + 4, innerHeight - menuNode.offsetHeight - 10) + "px";
  menuNode.querySelectorAll("[data-t]").forEach((b) =>
    b.addEventListener("click", () => { closeMenu(); onPick(b.dataset.t); })
  );
  if (onDelete) $(".del", menuNode).addEventListener("click", () => { closeMenu(); onDelete(); });
}

function blockEditor(p) {
  if (!p.body) { p.body = sectionsToBlocks(p.sections); delete p.sections; }
  const wrap = el('<div class="fgroup"><h3>Контент кейса</h3><span class="hint">«/» — меню типов · ## ### — заголовки · «- » — список · «> » — цитата · «---» — разделитель · Enter — новый блок</span><div class="blocks"></div></div>');
  const box = $(".blocks", wrap);

  const focusBlock = (k) => {
    const n = box.children[k] && box.children[k].querySelector("[contenteditable]");
    if (!n) return;
    n.focus();
    const rng = document.createRange();
    rng.selectNodeContents(n);
    rng.collapse(false);
    const sel = getSelection();
    sel.removeAllRanges();
    sel.addRange(rng);
  };

  const rerender = (focusIdx = null) => {
    if (!p.body.length) p.body.push(newBlock("p"));
    box.innerHTML = "";
    p.body.forEach((b, k) => box.appendChild(blockRow(b, k)));
    if (focusIdx !== null) focusBlock(focusIdx);
  };

  // Turn the block at index k into another type in place
  const convert = (k, type) => {
    p.body[k] = newBlock(type);
    setDirty(true);
    rerender(type === "img" || type === "divider" ? null : k);
  };

  // Markdown-style prefixes typed at the start of a plain text block
  const MD = [
    [/^###\s$/, "h3"],
    [/^##\s$/, "h2"],
    [/^#\s$/, "h2"],
    [/^[-*]\s$/, "ul"],
    [/^>\s$/, "quote"],
    [/^---$/, "divider"],
  ];

  // Small labelled image uploader; works on objects and arrays alike
  function coverBox(obj, key, label) {
    const wrap = el(`<div class="f" style="flex:1;min-width:0;"><span>${label}</span>
      <div class="cover${obj[key] ? " has" : ""}" style="${obj[key] ? `background-image:url('${obj[key]}')` : ""}">
        <span class="ph">+ Картинка</span><input type="file" accept="image/*"><button type="button" class="rm">убрать</button>
      </div></div>`);
    const cov = $(".cover", wrap), file = $("input[type=file]", wrap);
    file.addEventListener("change", async () => {
      if (!file.files[0]) return;
      try {
        toast("Загружаю картинку…");
        obj[key] = await uploadImage(file.files[0]);
        cov.classList.add("has");
        cov.style.backgroundImage = `url('${obj[key]}')`;
        setDirty(true);
        toast("Картинка загружена", "ok");
      } catch (err) { toast("Ошибка: " + err.message, "err"); }
    });
    $(".rm", wrap).addEventListener("click", (e) => {
      e.stopPropagation();
      obj[key] = ""; cov.classList.remove("has"); cov.style.backgroundImage = "";
      setDirty(true);
    });
    return wrap;
  }

  function blockRow(b, k) {
    const row = el(`<div class="block">
      <div class="gut"><button type="button" class="add" title="Добавить блок">+</button><button type="button" class="drag" draggable="true" title="Перетащить">⋮⋮</button></div>
      <div class="bc"></div></div>`);
    const bc = $(".bc", row);

    if (b.type === "img") {
      const cov = el(`<div class="cover${b.src ? " has" : ""}" style="${b.src ? `background-image:url('${b.src}')` : ""}">
        <span class="ph">+ Картинка<br><span class="mono" style="font-size:11px;opacity:0.7;">1856 × 1300 px</span></span><input type="file" accept="image/*"><button type="button" class="rm">убрать</button></div>`);
      const file = $("input", cov);
      file.addEventListener("change", async () => {
        if (!file.files[0]) return;
        try {
          toast("Загружаю картинку…");
          b.src = await uploadImage(file.files[0]);
          cov.classList.add("has");
          cov.style.backgroundImage = `url('${b.src}')`;
          setDirty(true);
          toast("Картинка загружена", "ok");
        } catch (err) { toast("Ошибка: " + err.message, "err"); }
      });
      $(".rm", cov).addEventListener("click", (e) => { e.stopPropagation(); b.src = ""; cov.classList.remove("has"); cov.style.backgroundImage = ""; setDirty(true); });
      bc.appendChild(cov);
    } else if (b.type === "divider") {
      bc.appendChild(el('<div class="bk-hr"><hr></div>'));
    } else if (b.type === "compare") {
      const pair = el('<div class="frow bk-pair"></div>');
      pair.appendChild(coverBox(b, "before", "До"));
      pair.appendChild(coverBox(b, "after", "После"));
      bc.appendChild(pair);
    } else if (b.type === "grid") {
      if (!Array.isArray(b.images)) b.images = ["", ""];
      const pair = el('<div class="frow bk-pair"></div>');
      pair.appendChild(coverBox(b.images, 0, "Левая"));
      pair.appendChild(coverBox(b.images, 1, "Правая"));
      bc.appendChild(pair);
    } else {
      const cls = { callout: "p", testimonial: "quote" }[b.type] || b.type;
      const ed = el(`<div class="bk bk-${cls}" contenteditable="true"></div>`);
      ed.dataset.ph = BLOCK_PH[b.type] || BLOCK_PH.p;
      const text = bi(b, "text")[L] || "";
      if (LINE_TYPES[b.type]) {
        // one editable line-div per item so every line carries its own marker
        ed.innerHTML = text.split("\n").filter((s) => s.trim()).map((s) => `<div>${esc(s)}</div>`).join("");
        ed.classList.add("bk-lines", "bk-lines-" + b.type);
      } else {
        ed.innerText = text;
      }
      ed.addEventListener("input", () => {
        const t = ed.innerText;
        // markdown shortcuts turn a plain text block into another type
        if (b.type === "p") {
          for (const [re, type] of MD) if (re.test(t)) { convert(k, type); return; }
        }
        if (t === "/" ) {
          openMenu(row, "Превратить в", (type) => convert(k, type));
          return;
        }
        bi(b, "text")[L] = t.replace(/\n+$/, "");
        setDirty(true);
      });
      ed.addEventListener("keydown", (e) => {
        // In line-based blocks, Enter makes the next item inside the same block
        if (e.key === "Enter" && !e.shiftKey && !LINE_TYPES[b.type]) {
          e.preventDefault();
          p.body.splice(k + 1, 0, newBlock("p"));
          setDirty(true);
          rerender(k + 1);
        } else if (e.key === "Backspace" && ed.innerText.trim() === "" && p.body.length > 1) {
          e.preventDefault();
          p.body.splice(k, 1);
          setDirty(true);
          rerender(Math.max(0, k - 1));
        }
      });

      if (b.type === "callout") {
        const box = el('<div class="bk-callout"></div>');
        const ico = el('<input class="ico" maxlength="4" title="Эмодзи врезки">');
        ico.value = b.icon || "💡";
        ico.addEventListener("input", () => { b.icon = ico.value; setDirty(true); });
        box.appendChild(ico);
        box.appendChild(ed);
        bc.appendChild(box);
      } else if (b.type === "testimonial") {
        const box = el('<div class="bk-testimonial"></div>');
        box.appendChild(ed);
        const au = el('<input class="author" placeholder="Автор — например: Anna K., Product Lead">');
        au.value = bi(b, "author")[L] || "";
        au.addEventListener("input", () => { bi(b, "author")[L] = au.value; setDirty(true); });
        box.appendChild(au);
        bc.appendChild(box);
      } else {
        bc.appendChild(ed);
      }
    }

    $(".add", row).addEventListener("click", (e) => {
      e.stopPropagation();
      openMenu(e.currentTarget, "Добавить блок",
        (type) => {
          p.body.splice(k + 1, 0, newBlock(type));
          setDirty(true);
          rerender(type === "img" || type === "divider" ? null : k + 1);
        },
        () => { p.body.splice(k, 1); setDirty(true); rerender(); }
      );
    });

    const handle = $(".drag", row);
    handle.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/plain", String(k));
      e.dataTransfer.effectAllowed = "move";
    });
    row.addEventListener("dragover", (e) => { e.preventDefault(); row.classList.add("dragover"); });
    row.addEventListener("dragleave", () => row.classList.remove("dragover"));
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      row.classList.remove("dragover");
      const from = parseInt(e.dataTransfer.getData("text/plain"), 10);
      if (isNaN(from) || from === k) return;
      const item = p.body.splice(from, 1)[0];
      p.body.splice(from < k ? k - 1 : k, 0, item);
      setDirty(true);
      rerender();
    });

    return row;
  }

  rerender();
  return wrap;
}

    $("#gateGo").addEventListener("click", () => {
      const val = $("#gateToken").value.trim();
      if (val) localStorage.setItem("gh-token", val);
      location.reload();
    });
    return;
  }
  try {
    const f = await api("contents/content.json?ref=" + BRANCH);
    SHA = f.sha;
    DATA = JSON.parse(b64d(f.content));
    $("#app").style.display = "flex";
    render();
  } catch (e) {
    $("#gate").style.display = "flex";
    $("#gate h2").textContent = "Не удалось загрузить контент";
    $("#gate p").textContent = e.message + " — проверь токен и попробуй ещё раз.";
  }
})();
</script>
</body>
</html>
